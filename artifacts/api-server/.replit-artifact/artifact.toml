kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "npm --prefix /home/runner/workspace run dev:server"

[services.production]

[services.production.build]
args = ["npm", "--prefix", "/home/runner/workspace", "run", "build:server"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "/home/runner/workspace/dist/server.js"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"

[services.env]
PORT = "8080"
