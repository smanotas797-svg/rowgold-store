kind = "web"
previewPath = "/"
title = "ROWGOLD — Luxury Jewelry Store"
version = "1.0.0"
id = "artifacts/rowgold"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25397

[services.development]
run = "npm --prefix /home/runner/workspace run dev:client"

[services.production]
build = [ "npm", "--prefix", "/home/runner/workspace", "run", "build:client" ]
publicDir = "dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25397"
BASE_PATH = "/"
