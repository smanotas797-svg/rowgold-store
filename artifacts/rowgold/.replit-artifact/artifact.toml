kind = "web"
previewPath = "/"
title = "ROWGOLD — Luxury Jewelry Store"
version = "1.0.0"
id = "artifacts/rowgold"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25397

[services.development]
run = "pnpm --filter @workspace/rowgold run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rowgold", "run", "build" ]
publicDir = "artifacts/rowgold/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25397"
BASE_PATH = "/"
